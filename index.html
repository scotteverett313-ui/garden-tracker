<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Dirt Rich" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&family=Special+Elite&display=swap" rel="stylesheet" />
    <title>Dirt Rich</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #faf6f0;
        font-family: 'Cabin', system-ui, sans-serif;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        scrollbar-width: none;
      }
      *::-webkit-scrollbar { display: none; }
      input, textarea {
        -webkit-user-select: text;
        user-select: text;
        -webkit-appearance: none;
        font-family: inherit;
      }
      select {
        -webkit-appearance: none;
        font-family: inherit;
      }
      button { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
